<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Table — Interview Study</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: #1a1a2e; background: #f5f5f7; min-height: 100vh; }
.page { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }
h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.meta { color: #666; font-size: 13px; margin-bottom: 20px; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 2px solid #e0e0e8; }
.tab-btn { background: none; border: none; padding: 8px 18px 10px; font-size: 14px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; display: flex; align-items: center; gap: 6px; }
.tab-btn:hover { color: #5b6af5; }
.tab-btn.active { color: #5b6af5; border-bottom-color: #5b6af5; }
.tab-badge { background: #ea4335; color: #fff; border-radius: 10px; font-size: 10px; font-weight: 700; padding: 1px 6px; display: none; }
.tab-badge.visible { display: inline; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Summary bar */
.summary-bar { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
.stat-card { background: #fff; border-radius: 10px; padding: 14px 20px; flex: 1; min-width: 120px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #888; margin-bottom: 4px; }
.stat-card .value { font-size: 26px; font-weight: 700; }

/* Charts */
.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
@media (max-width: 700px) { .charts { grid-template-columns: 1fr; } }
.chart-card { background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.chart-card h2 { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 12px; }
.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; font-size: 11px; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }

/* Table card */
.table-card { background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.table-header { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.table-header h2 { font-size: 13px; font-weight: 600; color: #444; flex: 1; }
select, input[type=text] { border: 1px solid #ddd; border-radius: 6px; padding: 5px 10px; font-size: 12px; background: #fff; color: #333; outline: none; }
select:focus, input[type=text]:focus { border-color: #5b6af5; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: #f8f8fa; }
th { padding: 9px 12px; text-align: left; font-size: 12px; font-weight: 600; color: #555; border-bottom: 1px solid #eee; cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { color: #5b6af5; }
th .sort-arrow { margin-left: 4px; opacity: .4; }
th.sorted .sort-arrow { opacity: 1; color: #5b6af5; }
td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
tr.code-row { cursor: pointer; }
tr.code-row:hover td { background: #fafafe; }
tr.code-row.open td { background: #f4f5ff; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge.predefined { background: #e8f0fe; color: #3a5bd9; }
.badge.emergent { background: #fff0e6; color: #c45d00; }
.conf-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; gap: 1px; min-width: 80px; }
.conf-seg.strong { background: #34a853; }
.conf-seg.moderate { background: #fbbc04; }
.conf-seg.tentative { background: #ea4335; }
.conf-seg { height: 100%; }

/* Quote panels */
tr.quotes-row td { padding: 0; }
.quotes-panel { padding: 12px 16px 16px; background: #f9f9ff; border-bottom: 2px solid #e0e0f0; }
.quote-item { border: 1px solid #e4e4f0; border-radius: 8px; background: #fff; margin-bottom: 10px; padding: 12px 14px; }
.quote-item.removed-item { opacity: .55; background: #f8f8f8; }
.quote-text { font-style: italic; color: #2c2c3e; line-height: 1.55; margin-bottom: 8px; }
.quote-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
.quote-ref { font-size: 11px; color: #888; font-family: monospace; }
.conf-pill { font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 600; }
.conf-pill.strong { background: #e6f4ea; color: #1e7a34; }
.conf-pill.moderate { background: #fef7e0; color: #8a6200; }
.conf-pill.tentative { background: #fce8e6; color: #a50e0e; }
.reassigned-note { font-size: 11px; color: #5b6af5; font-style: italic; }
.quote-rationale { font-size: 12px; color: #555; line-height: 1.5; margin-bottom: 10px; }

/* Per-quote inline controls */
.quote-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; padding-top: 8px; border-top: 1px solid #f0f0f0; }
.btn-sm { border-radius: 5px; padding: 3px 10px; font-size: 11px; cursor: pointer; border: 1px solid; }
.btn-remove-q { background: #fff0f0; color: #c0392b; border-color: #f5c6cb; }
.btn-remove-q:hover { background: #ffd5d5; }
.btn-restore-q { background: #f0fff4; color: #1e7a34; border-color: #b7dfc4; }
.btn-restore-q:hover { background: #d4f5e2; }
.reassign-select { font-size: 11px; border: 1px solid #ddd; border-radius: 5px; padding: 3px 7px; background: #fff; max-width: 180px; }
.new-tag-inline { display: flex; gap: 4px; align-items: center; }
.new-tag-inline input { width: 130px; padding: 3px 8px; font-size: 11px; }
.btn-new-tag { background: #5b6af5; color: #fff; border: none; border-radius: 5px; padding: 3px 10px; font-size: 11px; cursor: pointer; white-space: nowrap; }
.btn-new-tag:hover { background: #4453e0; }

/* By Transcript tab */
.tx-controls { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
.tx-controls label { font-size: 13px; font-weight: 600; color: #444; }
.tx-btn { background: #fff; border: 2px solid #ddd; border-radius: 20px; padding: 5px 16px; font-size: 13px; font-weight: 500; color: #666; cursor: pointer; }
.tx-btn:hover { border-color: #5b6af5; color: #5b6af5; }
.tx-btn.active { background: #5b6af5; border-color: #5b6af5; color: #fff; }
.tx-summary { display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
.tx-stat { background: #fff; border-radius: 8px; padding: 10px 16px; flex: 1; min-width: 100px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
.tx-stat .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #999; margin-bottom: 3px; }
.tx-stat .val { font-size: 20px; font-weight: 700; }
.tx-mini-chart { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.07); margin-bottom: 20px; }
.tx-mini-chart h3 { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 12px; }
.tx-code-section { margin-bottom: 14px; }
.tx-code-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #fff; border: 1px solid #e8e8f0; border-radius: 8px 8px 0 0; cursor: pointer; }
.tx-code-header:hover { background: #f8f8ff; }
.tx-code-header.open { background: #f0f2ff; border-color: #c5caff; }
.tx-code-name { font-weight: 600; font-size: 14px; flex: 1; }
.tx-code-count { font-size: 12px; color: #888; }
.tx-quotes-body { border: 1px solid #e8e8f0; border-top: none; border-radius: 0 0 8px 8px; padding: 12px; background: #fafafe; display: none; }
.tx-quotes-body.open { display: block; }

/* Unassigned Turns tab */
.unassigned-empty { text-align: center; padding: 48px 20px; color: #999; }
.unassigned-empty svg { display: block; margin: 0 auto 12px; }
.unassigned-count { font-size: 13px; color: #666; margin-bottom: 20px; }
.unassigned-card { background: #fff; border: 1px solid #e8e8f0; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
.unassigned-card.assigned { display: none; }
.unassigned-text { font-style: italic; color: #2c2c3e; line-height: 1.55; margin-bottom: 10px; }
.unassigned-meta { display: flex; gap: 10px; font-size: 11px; color: #888; font-family: monospace; margin-bottom: 12px; }
.assign-controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; padding-top: 8px; border-top: 1px solid #f0f0f0; }
.assign-controls label { font-size: 11px; color: #555; }
.btn-assign { background: #34a853; color: #fff; border: none; border-radius: 5px; padding: 3px 10px; font-size: 11px; cursor: pointer; }
.btn-assign:hover { background: #2d9245; }

/* Export */
.export-bar { margin-top: 20px; display: flex; justify-content: flex-end; }
.btn-export { background: #1a1a2e; color: #fff; border: none; border-radius: 7px; padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-export:hover { background: #2d2d50; }
</style>
</head>
<body>
<div class="page">
  <h1>Code Table</h1>
  <p class="meta">2026-03-28 &nbsp;·&nbsp; 2 transcripts &nbsp;·&nbsp; 25 coded segments &nbsp;·&nbsp; 45 total tag assignments</p>

  <div class="tabs">
    <button class="tab-btn active" data-tab="overview">Overview</button>
    <button class="tab-btn" data-tab="by-transcript">By Transcript</button>
    <button class="tab-btn" data-tab="unassigned">Unassigned Turns <span class="tab-badge" id="unassigned-badge">0</span></button>
  </div>

  <!-- ── OVERVIEW ── -->
  <div class="tab-panel active" id="tab-overview">
    <div class="summary-bar" id="summary-bar"></div>
    <div class="charts">
      <div class="chart-card">
        <h2>Code Frequency</h2>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#3a5bd9"></div>Predefined</div>
          <div class="legend-item"><div class="legend-dot" style="background:#c45d00"></div>Emergent</div>
        </div>
        <svg id="freq-chart" width="100%" height="220"></svg>
      </div>
      <div class="chart-card">
        <h2>Confidence Breakdown</h2>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#34a853"></div>Strong</div>
          <div class="legend-item"><div class="legend-dot" style="background:#fbbc04"></div>Moderate</div>
          <div class="legend-item"><div class="legend-dot" style="background:#ea4335"></div>Tentative</div>
        </div>
        <svg id="conf-chart" width="100%" height="220"></svg>
      </div>
    </div>
    <div class="table-card">
      <div class="table-header">
        <h2>All Codes</h2>
        <select id="filter-type"><option value="">All types</option><option value="predefined">Predefined</option><option value="emergent">Emergent</option></select>
        <select id="filter-conf"><option value="">All confidence</option><option value="strong">Has strong</option><option value="moderate">Has moderate</option><option value="tentative">Has tentative</option></select>
      </div>
      <table>
        <thead><tr>
          <th data-col="name">Code <span class="sort-arrow">↕</span></th>
          <th data-col="type">Type <span class="sort-arrow">↕</span></th>
          <th data-col="quotes">Quotes <span class="sort-arrow">↕</span></th>
          <th data-col="interviewees">Interviewees <span class="sort-arrow">↕</span></th>
          <th>Confidence</th>
          <th></th>
        </tr></thead>
        <tbody id="code-tbody"></tbody>
      </table>
    </div>
    <div class="export-bar"><button class="btn-export" id="export-btn">Export changes (tag-edits.json)</button></div>
  </div>

  <!-- ── BY TRANSCRIPT ── -->
  <div class="tab-panel" id="tab-by-transcript">
    <div class="tx-controls">
      <label>Transcript:</label>
      <div id="tx-selector"></div>
    </div>
    <div id="tx-views"></div>
  </div>

  <!-- ── UNASSIGNED TURNS ── -->
  <div class="tab-panel" id="tab-unassigned">
    <p class="unassigned-count" id="unassigned-count"></p>
    <div id="unassigned-list"></div>
  </div>
</div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────
const INITIAL_CODES = [
  { id:'survey_goals',          name:'Survey Goals',          type:'predefined', definition:'Tailoring insights to stated survey objectives' },
  { id:'validation',            name:'Validation',            type:'predefined', definition:'Need to verify or cross-check AI-generated outputs' },
  { id:'report_context_gap',    name:'Report Context Gap',    type:'emergent',   definition:'AI insights lack awareness of survey-specific design (routing logic, question framing), producing outputs that misrepresent data or mislead audiences' },
  { id:'skepticism_ai',         name:'Skepticism towards AI', type:'emergent',   definition:'Participant expresses doubt about AI accuracy and withholds trust until outputs are personally verified or demonstrably aligned with known data' },
  { id:'hypothesis_confirmation',name:'Hypothesis Confirmation',type:'emergent', definition:"AI value comes from converting team's pre-existing hypotheses into data-backed evidence usable for internal advocacy and leadership communication" },
  { id:'interactive_analytics', name:'Interactive Analytics', type:'emergent',   definition:'Participant wants to query AI interactively for custom cross-tabs/demographic breakdowns rather than receive a static pre-formed summary' }
];

const TRANSCRIPTS = [
  { id:'transcript-01', label:'Transcript 01', participant:'P01 — Julia, CX Analyst' },
  { id:'transcript-02', label:'Transcript 02', participant:'P02 — Jacklyn, Market Researcher' }
];

// Unassigned turns — populate from transcript Unassigned Turns tables
// Format: { id, transcript, participant, turnRef, timestamp, text }
const INITIAL_UNASSIGNED = [
  // No unassigned turns recorded in current transcripts (coded before skill update).
  // Future sessions will populate this array.
];

const INITIAL_ASSIGNMENTS = [
  { id:'a01', codeId:'survey_goals', turnRef:'T-02', transcript:'transcript-01', participant:'P01', confidence:'moderate', text:"It's saved me a lot of time because I was trying to manually get like samples of feedback and try and like generalize the themes within them myself... So putting them in Copilot has just saved me like a ton of time. And then they'll give me like, themes that they're seeing repetitively.", rationale:"AI serves participant's core need of extracting themes from large open-ended datasets aligned with survey objectives." },
  { id:'a02', codeId:'survey_goals', turnRef:'T-06', transcript:'transcript-01', participant:'P01', confidence:'strong',   text:"Yeah. So the summary, I really like the summary because I feel like it's something that I could like take outside of my department just to kind of like share what's going on... I loved when I read that [first call resolution finding] because like we're trying to emphasis so much on first call resolution that I thought that was like so helpful.", rationale:"Summary insight directly names team's strategic priority (first call resolution); immediately recognized as useful and shareable." },
  { id:'a03', codeId:'survey_goals', turnRef:'T-07', transcript:'transcript-01', participant:'P01', confidence:'strong',   text:"I think like just saying open ended feedback I can assume like which question they're talking about but I think if I were to just show this to someone they wouldn't know like the open ended is just kind of like vague in that case. [Also: Report Context Gap]", rationale:"Insight fails usefulness test because label 'open ended feedback' obscures which survey questions are being analyzed, preventing accurate stakeholder communication." },
  { id:'a04', codeId:'survey_goals', turnRef:'T-08', transcript:'transcript-01', participant:'P01', confidence:'strong',   text:"If it just says open ended feedback highlights opportunities then they're going to think probably that all the open ended feedback is negative. Whereas it's probably just on that one question that you only get if you rate the company negative. So it's kind of just like a little misleading in my opinion. [Also: Report Context Gap]", rationale:"Insight is actively harmful to survey objectives because it will cause non-CX stakeholders to misinterpret the data." },
  { id:'a05', codeId:'survey_goals', turnRef:'T-10', transcript:'transcript-01', participant:'P01', confidence:'strong',   text:"And like we can pull that out, like we can make that generalization. But this summary, like saying that right off the bat is like something that people higher than me would like love to see for like some validation for wanting to raise that first call resolution rate. [Also: Hypothesis Confirmation]", rationale:"Insight aligns exactly with team's stated survey objective; participant frames it as actionable evidence for upward influence." },
  { id:'a06', codeId:'survey_goals', turnRef:'T-11', transcript:'transcript-01', participant:'P01', confidence:'moderate', text:"Other than the open ended feedback, like maybe not being specific enough, I think everything in the summary is accurate.", rationale:"Accuracy of overview confirms AI understood survey purpose; baseline for objective alignment." },
  { id:'a07', codeId:'survey_goals', turnRef:'T-12', transcript:'transcript-01', participant:'P01', confidence:'strong',   text:"Like for me personally, I don't, I wouldn't say like it's very useful because I already know those things. But if I wanted to share this with someone else. They would probably like, really like to see that... it's helpful for me to like, say without having to type it out myself. I could just show this and say, like, this is our purpose and methodology because it is accurate.", rationale:"Overview section's value is entirely in serving the sharing/communication objective, not self-insight." },
  { id:'a08', codeId:'survey_goals', turnRef:'T-13', transcript:'transcript-01', participant:'P01', confidence:'moderate', text:"Okay, I like this. I like this section especially like these four here... They're like, good for like quickly understanding the results. And then if you go down, I like to see these tables especially like that you have the sample size there. So we can see. Like, this isn't just based on a few responses. [Also: Validation]", rationale:"Quick-scan format and sample size visibility help participant confirm findings are representative before acting on them." },
  { id:'a09', codeId:'survey_goals', turnRef:'T-14', transcript:'transcript-01', participant:'P01', confidence:'strong',   text:"It literally says focusing on first call resolution could reduce repeat inquiry. That's great. That's like totally accurate. And everything we've hypothesized on our own... training representatives to consistently demonstrate understanding and make customers feel valued could boost satisfaction. Like, that is really helpful. [Also: Hypothesis Confirmation]", rationale:"Recommendations map directly onto active departmental initiatives; highest objective alignment of any section reviewed." },
  { id:'a10', codeId:'survey_goals', turnRef:'T-15', transcript:'transcript-01', participant:'P01', confidence:'moderate', text:"Since it's actually taking the results from the survey and like taking that generalization out of it, I think that makes it helpful. We could obviously kind of like pull that generalization out ourselves maybe. But like using the data to do that is helpful. [Also: Hypothesis Confirmation]", rationale:"Data-sourced generalization adds evidential weight to insights participant already holds." },
  { id:'a11', codeId:'survey_goals', turnRef:'T-J03', transcript:'transcript-02', participant:'P02', confidence:'strong',   text:"it would have was accurate because I double checked everything and it was way more detailed than I would ever write... Mostly like client facing. But it gave me so much information and it did the statistics for the data down to like comparing it to last year. [Also: Validation]", rationale:"AI-generated slide addressed the exact deliverable objectives (comparison to prior year, detailed statistics) for an executive-facing report." },
  { id:'a12', codeId:'survey_goals', turnRef:'T-J08', transcript:'transcript-02', participant:'P02', confidence:'strong',   text:"The objective was exactly that. Kind of understand the consumer perception and red light therapy and what would motivate them in terms of the benefits... the things that pop the most as we kind of expected as we heard from the client, were reducing fine lines and wrinkles, improving skin elasticity and also reducing stress and anxiety. In that one was exciting. [Also: Hypothesis Confirmation]", rationale:"Summary directly names the research objective and surfaces findings matching it; stress/anxiety finding added value beyond anticipated results." },
  { id:'a13', codeId:'survey_goals', turnRef:'T-J12', transcript:'transcript-02', participant:'P02', confidence:'strong',   text:"I don't look for actions in those... the way I think about it is again, it's like here are the top three.", rationale:"Explicit definition of what makes a key finding useful — prioritized findings that reflect the survey, not AI-generated action recommendations." },
  { id:'a14', codeId:'survey_goals', turnRef:'T-J13', transcript:'transcript-02', participant:'P02', confidence:'strong',   text:"Some of this I don't care, like willingness to join the future panel. Like that's not an objective. We just put that in there every time we have a survey, right? [Also: Report Context Gap]", rationale:"AI surfaced a boilerplate question (future panel opt-in) as if it were a research objective." },
  { id:'a15', codeId:'survey_goals', turnRef:'T-J14', transcript:'transcript-02', participant:'P02', confidence:'strong',   text:"I want to see why people were interested in red light therapy... I wanted to see it like listed out... calling out like, oh, interesting people under 30, you know, sleep and mood was more important. [Also: Interactive Analytics]", rationale:"Describes a specific unmet objective — a synthesized, cross-tabulated view linking open-ended responses to rated importance by demographic." },
  { id:'a16', codeId:'survey_goals', turnRef:'T-J15', transcript:'transcript-02', participant:'P02', confidence:'strong',   text:"I wanted it to be more interactive versus just it telling me that going through and like highlighting questions that I wanted to be included and not. [Also: Interactive Analytics]", rationale:"Current static report format cannot serve participant's survey objectives because she needs to interrogate the data by specific question and demographic." },
  { id:'a17', codeId:'validation',   turnRef:'T-03',  transcript:'transcript-01', participant:'P01', confidence:'strong',   text:"A lot of the integrity of like, what's in the data matters a lot to me. Like, I wouldn't want to just upload it to Copilot and then trust everything they say without validating some of it myself... Because I wouldn't, I wouldn't want to like throw up the results from copilot on something without having validated it myself. [Also: Skepticism towards AI]", rationale:"Explicit and systematic validation protocol grounded in statistics background; frames non-validation as professionally unacceptable." },
  { id:'a18', codeId:'validation',   turnRef:'T-04',  transcript:'transcript-01', participant:'P01', confidence:'moderate', text:"I think it's just really time consuming. Like, I would love to save time doing that. I also think it's nice that I can validate it myself, but nobody else is really, like, doing that with me. So it's kind of just all me on my own... it's just time consuming and it's hard to know if I'm always like doing the right thing with it.", rationale:"Acknowledges necessity of validation while flagging burden; uncertainty about quality of solo validation process." },
  { id:'a19', codeId:'validation',   turnRef:'T-05',  transcript:'transcript-01', participant:'P01', confidence:'strong',   text:"I'll take like a hundred out of a thousand comments and manually do it. But for copilot, like I'll give them all 1000 comments and say like, can you please pull out like the common themes you're seeing?", rationale:"Describes concrete validation methodology — spot-check 10% manually against full AI coverage — as a deliberate tradeoff between effort and confidence." },
  { id:'a20', codeId:'validation',   turnRef:'T-13',  transcript:'transcript-01', participant:'P01', confidence:'moderate', text:"It's good to just see like buckets of how many people are what are saying what... this isn't just based on a few responses. Like, it's based on all of them. [Also: Survey Goals]", rationale:"Sample size shown in report allows credibility assessment before acting on or sharing findings; validation through transparency." },
  { id:'a21', codeId:'validation',   turnRef:'T-16',  transcript:'transcript-01', participant:'P01', confidence:'strong',   text:"I have that turned on and I do find myself changing the sentiment sometimes more often than not... like the comment will say like 'hire good representatives' and then the sentiment will say positive. But what the customer is really saying is you need to hire better representatives. So then I end up changing that sentiment a lot. [Also: Report Context Gap, Skepticism towards AI]", rationale:"Participant manually overrides AI sentiment classification frequently; AI output for this feature cannot be used as-is without human correction." },
  { id:'a22', codeId:'validation',   turnRef:'T-J01', transcript:'transcript-02', participant:'P02', confidence:'strong',   text:"I don't trust people. Like, I found that I have a hard time... I've seen so much bad data. And I think that if it has my name on it and it's going through my company, I have to look through it. [Also: Skepticism towards AI]", rationale:"Professional accountability is the primary driver of validation behavior; trust deficit applies to all data sources, including AI." },
  { id:'a23', codeId:'validation',   turnRef:'T-J03', transcript:'transcript-02', participant:'P02', confidence:'moderate', text:"I double checked everything and it was way more detailed than I would ever write... it gave me so much information and it did the statistics for the data down to like comparing it to last year. [Also: Survey Goals]", rationale:"Even after a positive AI experience, double-checking was immediate and reflexive — validation as non-negotiable habit, not a response to suspicion." },

// ─── STATE ─────────────────────────────────────────────────────────────────
let codes        = INITIAL_CODES.map(c => ({...c}));
let assignments  = INITIAL_ASSIGNMENTS.map(a => ({...a, removed:false, originalCodeId:a.codeId}));
let unassigned   = INITIAL_UNASSIGNED.map(u => ({...u, assignedCodeId:null}));
let editLog      = [];
let openCodeIds  = new Set();
let openTxSecs   = {};
let sortCol = 'quotes', sortDir = -1;
let filterType = '', filterConf = '';
let activeTx = TRANSCRIPTS[0].id;

// ─── HELPERS ───────────────────────────────────────────────────────────────
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const activeA = (tx) => assignments.filter(a => !a.removed && (!tx || a.transcript===tx));
const origName = id => (INITIAL_CODES.find(c=>c.id===id)||codes.find(c=>c.id===id)||{name:id}).name;

function codeStats(tx) {
  const active = activeA(tx);
  return codes.map(c => {
    const qs = active.filter(a => a.codeId===c.id);
    return { ...c, quotes:qs.length, interviewees:new Set(qs.map(a=>a.participant)).size,
      strong:qs.filter(a=>a.confidence==='strong').length,
      moderate:qs.filter(a=>a.confidence==='moderate').length,
      tentative:qs.filter(a=>a.confidence==='tentative').length };
  });
}

function codeOptions(selectedId) {
  return codes.map(c=>`<option value="${c.id}"${c.id===selectedId?' selected':''}>${esc(c.name)}</option>`).join('');
}

// ─── SHARED QUOTE CARD ─────────────────────────────────────────────────────
function quoteCardHTML(a) {
  const reassigned = a.codeId !== a.originalCodeId;
  return `<div class="quote-item${a.removed?' removed-item':''}" id="qcard-${a.id}">
    <div class="quote-text">"${esc(a.text)}"</div>
    <div class="quote-meta">
      <span class="quote-ref">${a.participant} · ${a.turnRef} · ${a.transcript}</span>
      <span class="conf-pill ${a.confidence}">${a.confidence}</span>
      ${reassigned?`<span class="reassigned-note">↳ from ${esc(origName(a.originalCodeId))}</span>`:''}
    </div>
    <div class="quote-rationale">${esc(a.rationale)}</div>
    <div class="quote-controls">
      ${a.removed
        ? `<button class="btn-sm btn-restore-q" onclick="toggleRemove('${a.id}')">Restore</button>`
        : `<button class="btn-sm btn-remove-q" onclick="toggleRemove('${a.id}')">Remove tag</button>
           <select class="reassign-select" onchange="reassignTag('${a.id}',this.value)">${codeOptions(a.codeId)}</select>
           <div class="new-tag-inline">
             <input type="text" id="nt-${a.id}" placeholder="New tag…" />
             <button class="btn-new-tag" onclick="newTagForQuote('${a.id}')">+ New tag</button>
           </div>`
      }
    </div>
  </div>`;
}

// ─── EDIT ACTIONS ──────────────────────────────────────────────────────────
function toggleRemove(aid) {
  const a = assignments.find(x=>x.id===aid); if (!a) return;
  a.removed = !a.removed;
  editLog.push({action:a.removed?'remove':'restore', assignmentId:aid, transcript:a.transcript, turnRef:a.turnRef, codeId:a.codeId, timestamp:new Date().toISOString()});
  refreshAll();
}

function reassignTag(aid, newCodeId) {
  const a = assignments.find(x=>x.id===aid); if (!a||a.codeId===newCodeId) return;
  editLog.push({action:'reassign', assignmentId:aid, transcript:a.transcript, turnRef:a.turnRef, fromCode:a.codeId, toCode:newCodeId, timestamp:new Date().toISOString()});
  a.codeId = newCodeId;
  refreshAll();
}

function newTagForQuote(aid) {
  const input = document.getElementById(`nt-${aid}`);
  if (!input) return;
  const name = input.value.trim(); if (!name) { input.focus(); return; }
  const newId = 'custom_'+Date.now();
  codes.push({id:newId, name, type:'emergent', definition:'(User-defined emergent code)'});
  editLog.push({action:'add_code', codeId:newId, codeName:name, timestamp:new Date().toISOString()});
  const a = assignments.find(x=>x.id===aid);
  if (a) {
    editLog.push({action:'reassign', assignmentId:aid, transcript:a.transcript, turnRef:a.turnRef, fromCode:a.codeId, toCode:newId, timestamp:new Date().toISOString()});
    a.codeId = newId;
  }
  openCodeIds.add(newId);
  refreshAll();
}

function assignUnassigned(uid, codeId) {
  if (!codeId) return;
  const u = unassigned.find(x=>x.id===uid); if (!u||u.assignedCodeId) return;
  u.assignedCodeId = codeId;
  const newA = {id:'ua_'+Date.now(), codeId, turnRef:u.turnRef, transcript:u.transcript, participant:u.participant,
    confidence:'moderate', text:u.text, rationale:'(Assigned from Unassigned Turns)', removed:false, originalCodeId:codeId};
  assignments.push(newA);
  editLog.push({action:'assign_unassigned', unassignedId:uid, turnRef:u.turnRef, transcript:u.transcript, toCode:codeId, timestamp:new Date().toISOString()});
  refreshAll();
}

function newTagForUnassigned(uid) {
  const input = document.getElementById(`unt-${uid}`);
  if (!input) return;
  const name = input.value.trim(); if (!name) { input.focus(); return; }
  const newId = 'custom_'+Date.now();
  codes.push({id:newId, name, type:'emergent', definition:'(User-defined emergent code)'});
  editLog.push({action:'add_code', codeId:newId, codeName:name, timestamp:new Date().toISOString()});
  assignUnassigned(uid, newId);
}

// ─── CHARTS ────────────────────────────────────────────────────────────────
function drawChart(svgId, stats, colorFn, stackFn) {
  const svg = document.getElementById(svgId); if (!svg) return;
  svg.innerHTML = '';
  const data = stats.filter(c=>c.quotes>0).sort((a,b)=>b.quotes-a.quotes);
  if (!data.length) return;
  const W = svg.clientWidth||480, H=220, pad={top:10,bottom:60,left:10,right:10};
  const cW=W-pad.left-pad.right, cH=H-pad.top-pad.bottom;
  const maxQ=Math.max(...data.map(s=>s.quotes));
  const bW=(cW/data.length)*.6, gap=(cW/data.length)*.4;
  svg.setAttribute('height',H);
  const ns='http://www.w3.org/2000/svg';
  const g=document.createElementNS(ns,'g'); g.setAttribute('transform',`translate(${pad.left},${pad.top})`);
  const mk=(tag,attrs,txt)=>{const el=document.createElementNS(ns,tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));if(txt!==undefined)el.textContent=txt;return el;};

  data.forEach((c,i)=>{
    const x=i*(bW+gap)+gap/2;
    if (stackFn) {
      let yOff=cH;
      stackFn(c).forEach(([val,fill])=>{if(!val)return;const bH=(val/maxQ)*cH;yOff-=bH;g.appendChild(mk('rect',{x,y:yOff,width:Math.max(0,bW),height:Math.max(0,bH),fill,rx:2}));});
      g.appendChild(mk('text',{x:x+bW/2,y:yOff-4,'text-anchor':'middle','font-size':'11',fill:'#333','font-weight':'600'},c.quotes));
    } else {
      const bH=(c.quotes/maxQ)*cH;
      g.appendChild(mk('rect',{x,y:cH-bH,width:Math.max(0,bW),height:Math.max(0,bH),fill:colorFn(c),rx:3}));
      g.appendChild(mk('text',{x:x+bW/2,y:cH-bH-4,'text-anchor':'middle','font-size':'11',fill:'#333','font-weight':'600'},c.quotes));
    }
    const words=c.name.split(' '),lineH=13,maxL=12;
    let lines=[],cur='';
    words.forEach(w=>{if((cur+' '+w).trim().length>maxL&&cur){lines.push(cur.trim());cur=w;}else{cur=(cur+' '+w).trim();}});
    if(cur)lines.push(cur);
    lines.forEach((ln,li)=>g.appendChild(mk('text',{x:x+bW/2,y:cH+14+li*lineH,'text-anchor':'middle','font-size':'10',fill:'#555'},ln)));
  });
  svg.appendChild(g);
}

function renderCharts(tx) {
  const stats = codeStats(tx);
  drawChart('freq-chart', stats, c=>c.type==='predefined'?'#3a5bd9':'#c45d00', null);
  drawChart('conf-chart', stats, null, c=>[[c.tentative,'#ea4335'],[c.moderate,'#fbbc04'],[c.strong,'#34a853']]);
}

// ─── SUMMARY BAR ───────────────────────────────────────────────────────────
function renderSummaryBar() {
  const active = activeA();
  document.getElementById('summary-bar').innerHTML = `
    <div class="stat-card"><div class="label">Codes</div><div class="value">${codes.length}</div></div>
    <div class="stat-card"><div class="label">Tag Assignments</div><div class="value">${active.length}</div></div>
    <div class="stat-card"><div class="label">Transcripts</div><div class="value">${new Set(active.map(a=>a.transcript)).size}</div></div>
    <div class="stat-card"><div class="label">Interviewees</div><div class="value">${new Set(active.map(a=>a.participant)).size}</div></div>`;
}

// ─── OVERVIEW TABLE ────────────────────────────────────────────────────────
function confBarHTML(s,m,t) {
  const tot=s+m+t; if(!tot) return '<span style="color:#ccc;font-size:11px">—</span>';
  return `<div class="conf-bar">${s?`<div class="conf-seg strong" style="width:${s/tot*100}%"></div>`:''
  }${m?`<div class="conf-seg moderate" style="width:${m/tot*100}%"></div>`:''
  }${t?`<div class="conf-seg tentative" style="width:${t/tot*100}%"></div>`:''}</div>`;
}

function renderTable() {
  const tbody = document.getElementById('code-tbody'); tbody.innerHTML='';
  document.querySelectorAll('th[data-col]').forEach(th=>{
    th.classList.toggle('sorted',th.dataset.col===sortCol);
    const arr=th.querySelector('.sort-arrow'); if(arr) arr.textContent=th.dataset.col===sortCol?(sortDir===1?'↑':'↓'):'↕';
  });
  let stats=codeStats();
  if(filterType) stats=stats.filter(c=>c.type===filterType);
  if(filterConf) stats=stats.filter(c=>c[filterConf]>0);
  stats.sort((a,b)=>{let va=a[sortCol],vb=b[sortCol];if(typeof va==='string'){va=va.toLowerCase();vb=vb.toLowerCase();}return sortDir*(va>vb?1:va<vb?-1:0);});

  stats.forEach(c=>{
    const isOpen=openCodeIds.has(c.id);
    const row=document.createElement('tr'); row.className=`code-row${isOpen?' open':''}`;
    row.innerHTML=`
      <td><strong>${esc(c.name)}</strong><br><span style="font-size:11px;color:#777">${esc(c.definition)}</span></td>
      <td><span class="badge ${c.type}">${c.type}</span></td>
      <td><strong>${c.quotes}</strong></td><td>${c.interviewees}</td>
      <td>${confBarHTML(c.strong,c.moderate,c.tentative)}</td>
      <td style="text-align:right;color:#888;font-size:18px">${isOpen?'▲':'▼'}</td>`;
    row.addEventListener('click',()=>{openCodeIds.has(c.id)?openCodeIds.delete(c.id):openCodeIds.add(c.id);renderTable();});
    tbody.appendChild(row);
    if (isOpen) {
      const qr=document.createElement('tr'); qr.className='quotes-row';
      const td=document.createElement('td'); td.colSpan=6;
      const qs=[...assignments.filter(a=>a.codeId===c.id), ...assignments.filter(a=>a.removed&&a.originalCodeId===c.id&&!assignments.find(x=>!x.removed&&x.id===a.id&&x.codeId===c.id))];
      const unique=[...new Map(qs.map(a=>[a.id,a])).values()];
      td.innerHTML=`<div class="quotes-panel">${unique.map(a=>quoteCardHTML(a)).join('')||'<p style="color:#999;font-size:12px">No quotes assigned.</p>'}</div>`;
      qr.appendChild(td); tbody.appendChild(qr);
    }
  });
}

// ─── BY TRANSCRIPT TAB ─────────────────────────────────────────────────────
function renderTxTab() {
  // selector
  document.getElementById('tx-selector').innerHTML = TRANSCRIPTS.map(tx=>
    `<button class="tx-btn${tx.id===activeTx?' active':''}" onclick="switchTx('${tx.id}')">${tx.label}</button>`).join('');

  const tx = TRANSCRIPTS.find(t=>t.id===activeTx);
  const txA = activeA(activeTx);
  const txStats = codeStats(activeTx).filter(c=>c.quotes>0).sort((a,b)=>b.quotes-a.quotes);
  const container = document.getElementById('tx-views');
  container.innerHTML = `
    <div class="tx-summary">
      <div class="tx-stat"><div class="lbl">Participant</div><div class="val" style="font-size:14px;margin-top:4px">${tx.participant}</div></div>
      <div class="tx-stat"><div class="lbl">Codes Used</div><div class="val">${txStats.length}</div></div>
      <div class="tx-stat"><div class="lbl">Tag Assignments</div><div class="val">${txA.length}</div></div>
    </div>
    <div class="tx-mini-chart">
      <h3>Code Frequency — ${tx.label}</h3>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#3a5bd9"></div>Predefined</div>
        <div class="legend-item"><div class="legend-dot" style="background:#c45d00"></div>Emergent</div>
      </div>
      <svg id="tx-freq-chart" width="100%" height="180"></svg>
    </div>`;

  txStats.forEach(c => {
    const qs = txA.filter(a=>a.codeId===c.id);
    const secId = `${activeTx}-${c.id}`;
    const isOpen = !!openTxSecs[secId];
    const sec = document.createElement('div'); sec.className='tx-code-section';
    sec.innerHTML=`
      <div class="tx-code-header${isOpen?' open':''}" onclick="toggleTxSec('${secId}',this)">
        <span class="badge ${c.type}">${c.type}</span>
        <span class="tx-code-name">${esc(c.name)}</span>
        <span class="tx-code-count">${c.quotes} quote${c.quotes!==1?'s':''} · ${c.strong}S / ${c.moderate}M / ${c.tentative}T</span>
        <span style="margin-left:auto;color:#aaa;font-size:16px">${isOpen?'▲':'▼'}</span>
      </div>
      <div class="tx-quotes-body${isOpen?' open':''}" id="txb-${secId}">
        ${qs.map(a=>quoteCardHTML(a)).join('')}
      </div>`;
    container.appendChild(sec);
  });

  requestAnimationFrame(()=>{
    const stats=codeStats(activeTx);
    drawChart('tx-freq-chart',stats,c=>c.type==='predefined'?'#3a5bd9':'#c45d00',null);
  });
}

function switchTx(txId) { activeTx=txId; renderTxTab(); }
function toggleTxSec(secId, hdr) {
  openTxSecs[secId]=!openTxSecs[secId];
  const isOpen=openTxSecs[secId];
  hdr.classList.toggle('open',isOpen);
  hdr.querySelector('span:last-child').textContent=isOpen?'▲':'▼';
  document.getElementById(`txb-${secId}`).classList.toggle('open',isOpen);
}

// ─── UNASSIGNED TURNS TAB ──────────────────────────────────────────────────
function renderUnassignedTab() {
  const pending = unassigned.filter(u=>!u.assignedCodeId);
  const badge = document.getElementById('unassigned-badge');
  badge.textContent = pending.length;
  badge.classList.toggle('visible', pending.length>0);

  document.getElementById('unassigned-count').textContent =
    pending.length===0 ? 'All turns have been assigned a code.' : `${pending.length} turn${pending.length!==1?'s':''} without a code — assign tags below.`;

  document.getElementById('unassigned-list').innerHTML = unassigned.length===0
    ? `<div class="unassigned-empty">
        <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="#ccc" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p>No unassigned turns recorded in current transcripts.</p>
        <p style="font-size:12px;margin-top:6px">Future sessions coded with the updated data-tagging skill will populate this tab.</p>
      </div>`
    : unassigned.map(u=>`
        <div class="unassigned-card${u.assignedCodeId?' assigned':''}" id="ucard-${u.id}">
          <div class="unassigned-meta"><span>${u.participant}</span><span>${u.turnRef}</span><span>${u.transcript}</span>${u.timestamp?`<span>${u.timestamp}</span>`:''}</div>
          <div class="unassigned-text">"${esc(u.text)}"</div>
          <div class="assign-controls">
            <label>Assign tag:</label>
            <select id="usel-${u.id}"><option value="">— choose code —</option>${codeOptions('')}</select>
            <button class="btn-assign" onclick="assignUnassigned('${u.id}',document.getElementById('usel-${u.id}').value)">Assign</button>
            <div class="new-tag-inline">
              <input type="text" id="unt-${u.id}" placeholder="New tag…" />
              <button class="btn-new-tag" onclick="newTagForUnassigned('${u.id}')">+ New tag</button>
            </div>
          </div>
        </div>`).join('');
}

// ─── TABS ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    if (btn.dataset.tab==='by-transcript') renderTxTab();
    else if (btn.dataset.tab==='unassigned') renderUnassignedTab();
    else requestAnimationFrame(()=>renderCharts());
  });
});

// ─── SORT & FILTER ─────────────────────────────────────────────────────────
document.querySelectorAll('th[data-col]').forEach(th=>{
  th.addEventListener('click',()=>{sortCol===th.dataset.col?sortDir*=-1:(sortCol=th.dataset.col,sortDir=-1);renderTable();});
});
document.getElementById('filter-type').addEventListener('change',e=>{filterType=e.target.value;renderTable();});
document.getElementById('filter-conf').addEventListener('change',e=>{filterConf=e.target.value;renderTable();});

// ─── EXPORT ────────────────────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),edits:editLog},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='tag-edits.json'; a.click();
  URL.revokeObjectURL(url);
});

// ─── REFRESH ALL ───────────────────────────────────────────────────────────
function refreshAll() {
  renderSummaryBar();
  renderCharts();
  renderTable();
  if (document.getElementById('tab-by-transcript').classList.contains('active')) renderTxTab();
  if (document.getElementById('tab-unassigned').classList.contains('active')) renderUnassignedTab();
  // always keep badge updated
  const pending=unassigned.filter(u=>!u.assignedCodeId).length;
  const badge=document.getElementById('unassigned-badge');
  badge.textContent=pending; badge.classList.toggle('visible',pending>0);
}

refreshAll();
window.addEventListener('resize',()=>{
  renderCharts();
  if (document.getElementById('tab-by-transcript').classList.contains('active')) renderTxTab();
});
</script>
</body>
</html>
